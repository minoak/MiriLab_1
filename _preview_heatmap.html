 바로 올렸어요. 용돈 빠듯한데 도움 되겠죠.", "actions": ["친구 공유", "조건 확인", "추후 신청 고려"]}, {"pid": "p10", "name": "강도현", "profile": "31·남·울산 남", "stanceLabel": "혼합", "stanceColor": "#F39C12", "stanceBg": "rgba(243,156,18,0.14)", "scores": [62, 50, 58, 35], "cellStyles": ["background-color: rgb(116,176,218); color: #ffffff; text-align: center; font-weight: 600;", "background-color: rgb(143,191,226); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(125,181,221); color: #ffffff; text-align: center; font-weight: 600;", "background-color: rgb(247,192,187); color: #1f3b54; text-align: center; font-weight: 600;"], "text": "결혼해서 부부가 월세로 사는데 이게 1인 청년만 되는 건지 부부도 되는 건지 헷갈리네요. 조건만 맞으면 당연히 신청해야죠. 행정복지센터에 한번 물어볼게요.", "actions": ["행정복지센터 문의", "조건 확인", "아내와 상의"]}, {"pid": "p11", "name": "임수빈", "profile": "26·여·광주 북", "stanceLabel": "반대", "stanceColor": "#E74C3C", "stanceBg": "rgba(231,76,60,0.14)", "scores": [82, 18, 20, 75], "cellStyles": ["background-color: rgb(71,150,207); color: #ffffff; text-align: center; font-weight: 600;", "background-color: rgb(215,232,244); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(210,229,243); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(237,121,109); color: #ffffff; text-align: center; font-weight: 600;"], "text": "소득이 없는 저야말로 절실한데, 부모님이랑 같이 살면 또 안 된다고요? 매번 이런 식이에요. 정작 돈 없는 청년은 자취할 보증금도 없는데 말이죠.", "actions": ["커뮤니티에 불만 글", "다른 청년 지원 검색"]}, {"pid": "p04", "name": "정미영", "profile": "42·여·경기 수원", "stanceLabel": "혼합", "stanceColor": "#F39C12", "stanceBg": "rgba(243,156,18,0.14)", "scores": [80, 20, 15, 22], "cellStyles": ["background-color: rgb(76,153,208); color: #ffffff; text-align: center; font-weight: 600;", "background-color: rgb(210,229,243); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(221,236,246); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(250,216,212); color: #1f3b54; text-align: center; font-weig : center; font-weight: 600;"], "text": "청년 지원이라니 우리 손주한테나 해당되겠구먼. 근데 복지로 누리집이 뭔지도 모르고, 면사무소까지 가야 하나? 시골 사람한텐 신청이 영 어렵소.", "actions": ["이장에게 문의", "손주에게 알림"]}, {"pid": "p01", "name": "김복순", "profile": "76·여·서울 서초", "stanceLabel": "혼합", "stanceColor": "#F39C12", "stanceBg": "rgba(243,156,18,0.14)", "scores": [22, 8, 5, 35], "cellStyles": ["background-color: rgb(206,227,242); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(237,245,250); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(244,249,252); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(247,192,187); color: #1f3b54; text-align: center; font-weight: 600;"], "text": "월세 지원이라는데 내가 받는 건지 아닌지 도통 모르겠어요. 글씨도 작고 어려워요. 젊은 사람들한테는 도움 되겠지만 나 같은 늙은이는 해당이 안 되는 것 같네.", "actions": ["주민센터 문의", "포기"]}, {"pid": "p08", "name": "오태경", "profile": "33·남·경기 분당", "stanceLabel": "반대", "stanceColor": "#E74C3C", "stanceBg": "rgba(231,76,60,0.14)", "scores": [90, 10, 5, 70], "cellStyles": ["background-color: rgb(53,140,202); color: #ffffff; text-align: center; font-weight: 600;", "background-color: rgb(233,242,249); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(244,249,252); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(238,130,118); color: #ffffff; text-align: center; font-weight: 600;"], "text": "취지는 알겠는데 소득 기준 중위 60%면 정작 빠듯한 사람도 애매하게 걸립니다. 예산 소진 시 조기 마감이면 선착순 줄서기일 뿐이죠. 설계가 허술해요.", "actions": ["온라인 비판 댓글", "지인 토론"]}, {"pid": "p09", "name": "윤말순", "profile": "68·여·강원 춘천", "stanceLabel": "혼합", "stanceColor": "#F39C12", "stanceBg": "rgba(243,156,18,0.14)", "scores": [25, 8, 5, 32], "cellStyles": ["background-color: rgb(199,223,240); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(237,245,250); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(244,249,252); color: #1f3b54; text-align: center; font-weight: 600;", "background-color: rgb(247,198,193); color: #1f3b54; text-align: center; font-weight: 600;"], "text": "월세 지원이라는데 우리 같은 노인은 안 되는 거지요? 글씨도 안 보이고 어려워서… 젊은 사람들한테나 좋은 거 같네요.", "actions": ["경로당에서 물어봄", "포기"]}];
const NCOLS = 6;
let sortCol = 2, sortDir = -1, openPid = null;

function rowMain(r) {
  let h = '<td class="nm"><div class="n">' + r.name + '</div>'
        + '<div class="s">' + r.profile + '</div></td>';
  h += '<td class="st"><span class="badge" style="background:' + r.stanceBg
     + ';color:' + r.stanceColor + '">\u25CF ' + r.stanceLabel + '</span></td>';
  for (let i = 0; i < r.scores.length; i++) {
    h += '<td class="sc" style="' + r.cellStyles[i] + '">' + r.scores[i] + '</td>';
  }
  return h;
}
function rowDetail(r) {
  let acts = r.actions.map(a => '<span class="chip">' + a + '</span>').join('');
  return '<div class="d-inner" style="border-left:4px solid ' + r.stanceColor + '">'
       + '<div class="quote">\u201C' + r.text + '\u201D</div>'
       + (acts ? '<div class="acts">' + acts + '</div>' : '') + '</div>';
}
function render() {
  const rows = DATA.slice().sort((a, b) => sortDir * (a.scores[sortCol] - b.scores[sortCol]));
  let h = '';
  for (const r of rows) {
    const open = r.pid === openPid;
    h += '<tr class="cr' + (open ? ' open' : '') + '" data-pid="' + r.pid + '">'
       + rowMain(r) + '</tr>';
    if (open) h += '<tr class="dr"><td colspan="' + NCOLS + '">' + rowDetail(r) + '</td></tr>';
  }
  document.getElementById('tb').innerHTML = h;
  document.querySelectorAll('th.so').forEach(th => {
    const c = parseInt(th.dataset.col, 10);
    th.querySelector('.ar').textContent =
      (c === sortCol) ? (sortDir < 0 ? ' \u2193' : ' \u2191') : '';
  });
}
document.getElementById('tb').addEventListener('click', e => {
  const tr = e.target.closest('tr.cr');
  if (!tr) return;
  const pid = tr.getAttribute('data-pid');
  openPid = (openPid === pid) ? null : pid;
  render();
});
document.querySelectorAll('th.so').forEach(th => {
  th.addEventListener('click', () => {
    const c = parseInt(th.dataset.col, 10);
    if (sortCol === c) { sortDir = -sortDir; } else { sortCol = c; sortDir = -1; }
    render();
  });
});
render();
</script></body></html>
