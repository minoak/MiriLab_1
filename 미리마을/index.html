<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책 마을 생활 시뮬레이션 v14</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#1e2c1d;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.app{display:grid;grid-template-columns:minmax(760px,1fr) 390px;min-height:100vh}
.map-area{padding:18px;overflow:auto;background:#243824}
.map-wrap{position:relative;width:1448px;height:1086px;overflow:hidden;border-radius:16px;border:4px solid rgba(255,255,255,.18);box-shadow:0 18px 42px rgba(0,0,0,.35);background:#4d7b47}
.map-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;user-select:none;pointer-events:none}
.path-line{position:absolute;height:4px;background:rgba(255,236,92,.45);transform-origin:left center;border-radius:999px;z-index:7;pointer-events:none;display:none}
.path-dot{position:absolute;width:7px;height:7px;margin-left:-3.5px;margin-top:-3.5px;border-radius:50%;background:rgba(255,236,92,.95);box-shadow:0 0 0 3px rgba(0,0,0,.23);z-index:8;pointer-events:none;display:none}
.map-wrap.debug .path-dot,.map-wrap.debug .path-line{display:block}
.agent{position:absolute;width:40px;height:40px;transform:translate(-50%,-90%);z-index:30;pointer-events:none;filter:drop-shadow(0 3px 2px rgba(0,0,0,.35))}
.name{position:absolute;left:50%;top:-11px;transform:translateX(-50%);white-space:nowrap;background:rgba(0,0,0,.72);color:#fff;border:1px solid rgba(255,255,255,.42);border-radius:999px;padding:1px 6px;font-size:10px;font-weight:900;z-index:3}
.sprite{position:absolute;left:0;top:0;width:40px;height:40px;background-repeat:no-repeat;background-size:120px 160px;image-rendering:pixelated}
.shadow{position:absolute;left:50%;bottom:2px;width:18px;height:5px;transform:translateX(-50%);border-radius:50%;background:rgba(0,0,0,.22);z-index:-1}
.agent.state-walk .sprite{animation:walkBob .32s steps(2) infinite}
.agent.state-idle .sprite{animation:idleBreath 1.45s ease-in-out infinite}
.agent.state-talk .sprite{animation:talkNod .62s ease-in-out infinite}
.agent.state-work .sprite{animation:workPulse .5s ease-in-out infinite}
@keyframes walkBob{0%{transform:translateY(0)}50%{transform:translateY(-1px)}100%{transform:translateY(0)}}
@keyframes idleBreath{0%,100%{transform:translateY(0)}50%{transform:translateY(-0.6px)}}
@keyframes talkNod{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-1px) rotate(1deg)}}
@keyframes workPulse{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}
.state-badge{position:absolute;left:50%;top:35px;transform:translateX(-50%);background:rgba(255,255,255,.90);color:#1d2a1d;border:1px solid rgba(0,0,0,.25);border-radius:999px;padding:1px 5px;font-size:10px;font-weight:900;opacity:0;transition:opacity .2s;white-space:nowrap}
.agent.state-idle .state-badge,.agent.state-talk .state-badge,.agent.state-work .state-badge{opacity:1}
.bubble{position:absolute;transform:translate(-50%,-135%);background:#fff;color:#222;font-weight:800;padding:6px 10px;border-radius:9px;border:2px solid #353535;box-shadow:0 4px 0 rgba(0,0,0,.24);font-size:13px;opacity:0;transition:opacity .2s;z-index:70;max-width:240px;pointer-events:none;text-align:center}
.bubble.show{opacity:1}
.panel{background:#111811;border-left:1px solid rgba(255,255,255,.12);padding:18px;overflow:auto}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.controls.row1{grid-template-columns:1fr}
button{width:100%;padding:12px;border-radius:10px;border:0;font-weight:800;background:#7fd36b;cursor:pointer}
button.alt{background:#dce6d6;color:#111}
button.ghost{background:#394739;color:#fff}
.stat{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px}
.card strong{display:block;font-size:12px;color:#aee9a2;margin-bottom:4px}
.card span{font-size:20px;font-weight:900}
.log{height:270px;overflow:auto;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px;font-size:13px;line-height:1.55}
.log p{margin:0 0 8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08)}
.agent-list{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.mini{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:7px;font-size:12px}
.mini b{color:#aee9a2}
.sub,.legend{color:#c7d6c7;font-size:12px;line-height:1.6}
h1,h3{margin:0 0 10px}
@media (max-width:1100px){.app{grid-template-columns:1fr}.panel{border-left:0;border-top:1px solid rgba(255,255,255,.12)}.map-area{height:68vh}}
</style>
</head>
<body>
<div class="app">
  <main class="map-area">
    <div class="map-wrap" id="mapWrap">
      <img class="map-bg" src="assets/map.png" alt="정책 마을 지도">
      <div class="bubble" id="bubble"></div>
    </div>
  </main>
  <aside class="panel">
    <h1>생활 시뮬레이션 v14</h1>
    <div class="sub">
      수정 내용: 캐릭터 크기를 더 줄였고, HTML 내부에 보이면 안 되는 스프라이트 띠가 나오지 않도록 자산 구성을 다시 정리했어.
      또한 이동 방향 계산과 스프라이트 행 매핑을 다시 정리했어.
    </div>
    <div class="controls row1"><button id="startBtn">시작</button></div>
    <div class="controls"><button class="alt" id="pauseBtn">일시정지</button><button class="ghost" id="debugBtn">좌표 보기</button></div>
    <div class="stat">
      <div class="card"><strong>상태</strong><span id="stateText">대기</span></div>
      <div class="card"><strong>시간</strong><span id="timeText">09:00</span></div>
      <div class="card"><strong>이동 거리</strong><span id="distText">0</span></div>
      <div class="card"><strong>대화 수</strong><span id="talkText">0</span></div>
      <div class="card"><strong>업무/활동</strong><span id="workText">0</span></div>
      <div class="card"><strong>경로 그룹</strong><span>31</span></div>
    </div>
    <h3>에이전트</h3><div class="agent-list" id="agentList"></div>
    <h3>로그</h3><div class="log" id="log"></div>
    <div class="legend">
      행 기준:<br>
      1행 = 아래(정면)<br>
      2행 = 오른쪽<br>
      3행 = 왼쪽<br>
      4행 = 위(뒷모습)
    </div>
  </aside>
</div>

const SPRITE_DEFS = {"minsu": {"name": "민수", "role": "청년 주민", "sheet": "assets/sprites/minsu.png", "cell": 48, "renderCell": 40, "rowMap": {"down": 0, "left": 2, "right": 1, "up": 3}, "frames": 3}, "staff": {"name": "영희", "role": "정책 담당 공무원", "sheet": "assets/sprites/staff.png", "cell": 48, "renderCell": 40, "rowMap": {"down": 0, "left": 2, "right": 1, "up": 3}, "frames": 3}, "owner": {"name": "박사장", "role": "카페 사장", "sheet": "assets/sprites/owner.png", "cell": 48, "renderCell": 40, "rowMap": {"down": 0, "left": 2, "right": 1, "up": 3}, "frames": 3}, "grandma": {"name": "김할머니", "role": "복지관 이용자", "sheet": "assets/sprites/grandma.png", "cell": 48, "renderCell": 40, "rowMap": {"down": 0, "left": 2, "right": 1, "up": 3}, "frames": 3}, "sua": {"name": "수아", "role": "학생 여자", "sheet": "assets/sprites/sua.png", "cell": 48, "renderCell": 40, "rowMap": {"down": 0, "left": 2, "right": 1, "up": 3}, "frames": 3}, "junho": {"name": "준호", "role": "학생 남자", "sheet": "assets/sprites/junho.png", "cell": 48, "renderCell": 40, "rowMap": {"down": 0, "left": 2, "right": 1, "up": 3}, "frames": 3}, "miyoung": {"name": "미영", "role": "주민 여성", "sheet": "assets/sprites/miyoung.png", "cell": 48, "renderCell": 40, "rowMap": {"down": 0, "left": 2, "right": 1, "up": 3}, "frames": 3}, "oldman": {"name": "박어르신", "role": "노인 남성", "sheet": "assets/sprites/oldman.png", "cell": 48, "renderCell": 40, "rowMap": {"down": 0, "left": 2, "right": 1, "up": 3}, "frames": 3}, "jimin": {"name": "지민", "role": "어린이", "sheet": "assets/sprites/jimin.png", "cell": 48, "renderCell": 40, "rowMap": {"down": 0, "left": 2, "right": 1, "up": 3}, "frames": 3}, "daeun": {"name": "다은", "role": "주민 여성", "sheet": "assets/sprites/daeun.png", "cell": 48, "renderCell": 40, "rowMap": {"down": 0, "left": 2, "right": 1, "up": 3}, "frames": 3}};
const FRAME_SEQ = [0,1,2,1];
const nodes = PATH_DATA.nodes;
const polylines = PATH_DATA.polylines;
const baseAgents = PATH_DATA.baseAgents;
const map = document.getElementById('mapWrap');
const logBox = document.getElementById('log');
const bubble = document.getElementById('bubble');
const agentList = document.getElementById('agentList');
const stateText = document.getElementById('stateText');
const distText = document.getElementById('distText');
const talkText = document.getElementById('talkText');
const workText = document.getElementById('workText');
const timeText = document.getElementById('timeText');
let agents = [], running = false, lastTime = null, animationId = null, totalDist = 0, talkCount = 0, workCount = 0, clockMin = 9 * 60;
function log(msg){const p=document.createElement('p');p.innerHTML=msg;logBox.prepend(p);}
function addDebugGraph(){
  polylines.forEach(line=>{
    for(let i=1;i<line.length;i++){
      const [x1,y1]=nodes[line[i-1]],[x2,y2]=nodes[line[i]];
      const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
      const el=document.createElement('div');el.className='path-line';
      el.style.left=x1+'px';el.style.top=y1+'px';el.style.width=len+'px';
      el.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;map.appendChild(el);
    }
  });
  Object.entries(nodes).forEach(([k,[x,y]])=>{
    const d=document.createElement('div');d.className='path-dot';d.style.left=x+'px';d.style.top=y+'px';d.title=k;map.appendChild(d);
  });
}
function makeLineInfo(line){
  const pts=line.map(k=>({key:k,x:nodes[k][0],y:nodes[k][1]}));
  const cum=[0];
  for(let i=1;i<pts.length;i++)cum[i]=cum[i-1]+Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
  return {pts,cum,total:cum[cum.length-1]||1};
}
const lineInfos=polylines.map(makeLineInfo);
function pointAt(lineInfo,s){
  s=Math.max(0,Math.min(lineInfo.total,s));
  const cum=lineInfo.cum,pts=lineInfo.pts;
  let i=1;while(i<cum.length&&cum[i]<s)i++;
  if(i>=pts.length)return {x:pts[pts.length-1].x,y:pts[pts.length-1].y};
  const prev=pts[i-1],next=pts[i],segLen=Math.max(1,cum[i]-cum[i-1]),t=(s-cum[i-1])/segLen;
  return {x:prev.x+(next.x-prev.x)*t,y:prev.y+(next.y-prev.y)*t};
}
function getWorkLabel(role){
  if(role.includes('카페'))return '커피 준비';
  if(role.includes('정책'))return '민원 처리';
  if(role.includes('학생'))return '공부중';
  if(role.includes('노인')||role.includes('복지'))return '휴식중';
  return '활동중';
}
function createAgent(base){
  const def=SPRITE_DEFS[base.sprite];
  const lineInfo=lineInfos[base.lineIndex]||lineInfos[0];
  const s=lineInfo.total*((base.pointIndex||0)/Math.max(1,lineInfo.pts.length-1));
  const pos=pointAt(lineInfo,s);
  const el=document.createElement('div');
  el.className='agent state-idle';
  el.innerHTML=`<div class="name">${base.name}</div><div class="shadow"></div><div class="sprite"></div><div class="state-badge">대기</div>`;
  map.appendChild(el);
  const spriteEl=el.querySelector('.sprite');
  spriteEl.style.backgroundImage=`url('${def.sheet}')`;
  const agent={...base,el,spriteEl,badge:el.querySelector('.state-badge'),lineInfo,s,dirSign:base.direction||1,x:pos.x,y:pos.y,speed:24+(base.lineIndex%5)*3,state:'idle',stateUntil:1+Math.random()*2,cooldown:1.5+Math.random()*2.5,frame:0,frameDistance:0,workLabel:getWorkLabel(base.role),lastDir:'down'};
  setAgentPosition(agent,agent.x,agent.y);
  setFrame(agent,'down',0);
  setState(agent,'idle',1+Math.random()*1.5);
  return agent;
}
function setAgentPosition(agent,x,y){agent.x=x;agent.y=y;agent.el.style.left=x+'px';agent.el.style.top=y+'px';}
function directionFor(dx,dy,lastDir){
  const ax=Math.abs(dx), ay=Math.abs(dy);
  if(ax<0.05 && ay<0.05) return lastDir||'down';
  if(ax>ay) return dx>=0 ? 'right' : 'left';
  return dy>=0 ? 'down' : 'up';
}
function setFrame(agent,dir,frame){
  const def=SPRITE_DEFS[agent.sprite];
  const row=def.rowMap[dir]??0;
  const col=FRAME_SEQ[frame%FRAME_SEQ.length];
  const rc=def.renderCell||40;
  agent.spriteEl.style.backgroundPosition=`${-col*rc}px ${-row*rc}px`;
  agent.lastDir=dir;
}
function setState(agent,state,duration,label){
  agent.state=state;agent.stateUntil=duration;
  agent.el.classList.remove('state-walk','state-idle','state-talk','state-work');
  agent.el.classList.add('state-'+state);
  if(state==='idle')agent.badge.textContent=label||'대기';
  if(state==='walk')agent.badge.textContent='이동';
  if(state==='talk')agent.badge.textContent=label||'대화';
  if(state==='work')agent.badge.textContent=label||agent.workLabel;
}
function renderAgentList(){agentList.innerHTML=agents.map(a=>`<div class="mini"><b>${a.name}</b><br>${a.role} · ${a.workLabel}</div>`).join('');}
function sayAt(x,y,text){
  bubble.textContent=text;bubble.style.left=x+'px';bubble.style.top=y+'px';bubble.classList.add('show');
  clearTimeout(bubble._timer);bubble._timer=setTimeout(()=>bubble.classList.remove('show'),1300);
}
function moveAgent(agent,dt){
  const before=pointAt(agent.lineInfo,agent.s);
  agent.s+=agent.speed*dt*agent.dirSign;
  if(agent.s<0){agent.s=0;agent.dirSign=1}
  if(agent.s>agent.lineInfo.total){agent.s=agent.lineInfo.total;agent.dirSign=-1}
  const pos=pointAt(agent.lineInfo,agent.s);
  setAgentPosition(agent,pos.x,pos.y);
  const dx=pos.x-before.x,dy=pos.y-before.y,moved=Math.hypot(dx,dy);
  if(moved>0.01){
    agent.frameDistance+=moved;
    if(agent.frameDistance>=10){agent.frame=(agent.frame+1)%4;agent.frameDistance=0}
    const dir=directionFor(dx,dy,agent.lastDir);
    setFrame(agent,dir,agent.frame);
  }
  totalDist+=moved;
}
function updateAgent(agent,dt){
  agent.cooldown=Math.max(0,agent.cooldown-dt);
  if(agent.state==='walk'){
    moveAgent(agent,dt);
    if(agent.cooldown<=0){
      const r=Math.random();
      if(r<0.012){
        setState(agent,'idle',1.2+Math.random()*1.8,'잠깐 멈춤');
        agent.cooldown=3+Math.random()*4;
      }else if(r<0.019){
        setState(agent,'work',2+Math.random()*2.5,agent.workLabel);
        workCount++;workText.textContent=workCount;
        log(`🛠️ <b>${agent.name}</b>(${agent.role}) : ${agent.workLabel}`);
        agent.cooldown=6+Math.random()*8;
      }
    }
    return;
  }
  agent.stateUntil-=dt;
  if(agent.state==='idle') setFrame(agent,agent.lastDir||'down',0);
  if(agent.state==='work'){
    const f=Math.floor(performance.now()/240)%2;
    setFrame(agent,agent.lastDir||'down',f);
  }
  if(agent.stateUntil<=0) setState(agent,'walk',9999);
}
function tryStartTalk(dt){
  agents.forEach(a=>a.talkCooldown=Math.max(0,(a.talkCooldown||0)-dt));
  for(let i=0;i<agents.length;i++)for(let j=i+1;j<agents.length;j++){
    const a=agents[i],b=agents[j];
    if(a.state==='talk'||b.state==='talk')continue;
    if((a.talkCooldown||0)>0||(b.talkCooldown||0)>0)continue;
    const dist=Math.hypot(a.x-b.x,a.y-b.y);
    if(dist<38&&Math.random()<0.02){
      const dx=b.x-a.x,dy=b.y-a.y;
      setFrame(a,directionFor(dx,dy,a.lastDir),0);
      setFrame(b,directionFor(-dx,-dy,b.lastDir),0);
      setState(a,'talk',2.2+Math.random(),'대화');
      setState(b,'talk',2.2+Math.random(),'대화');
      a.talkCooldown=7;b.talkCooldown=7;
      talkCount++;talkText.textContent=talkCount;
      log(`💬 <b>${a.name}</b>와 <b>${b.name}</b>가 대화`);
      sayAt((a.x+b.x)/2,(a.y+b.y)/2-18,'안녕하세요!');
      return;
    }
  }
}
function updateClock(dt){
  clockMin+=dt*3.2;
  const h=Math.floor(clockMin/60)%24,m=Math.floor(clockMin%60);
  timeText.textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
function loop(now){
  if(!running)return;
  if(lastTime===null)lastTime=now;
  const dt=Math.min(0.05,(now-lastTime)/1000);lastTime=now;
  agents.forEach(a=>updateAgent(a,dt));
  tryStartTalk(dt);updateClock(dt);
  distText.textContent=Math.floor(totalDist);
  animationId=requestAnimationFrame(loop);
}
function start(){
  if(running)return;
  running=true;lastTime=null;stateText.textContent='생활중';
  agents.forEach(a=>{if(a.state!=='talk'&&a.state!=='work')setState(a,'walk',9999)});
  log('✅ v14 시작: 좌우 방향 보정 버전입니다.');
  animationId=requestAnimationFrame(loop);
}
function pause(){
  running=!running;
  if(running){lastTime=null;stateText.textContent='생활중';animationId=requestAnimationFrame(loop)}
  else{stateText.textContent='일시정지';cancelAnimationFrame(animationId)}
}
function init(){addDebugGraph();agents=baseAgents.map(createAgent);renderAgentList();log('준비 완료: v14 전체 파일 버전입니다.');}
document.getElementById('startBtn').addEventListener('click',start);
document.getElementById('pauseBtn').addEventListener('click',pause);
document.getElementById('debugBtn').addEventListener('click',()=>map.classList.toggle('debug'));
init();
