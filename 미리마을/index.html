<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책 마을 생활 시뮬레이션 v14</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#1e2c1d;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.app{display:grid;grid-template-columns:minmax(760px,1fr) 390px;min-height:100vh}
.map-area{padding:18px;overflow:auto;background:#243824}
.map-wrap{position:relative;width:1448px;height:1086px;overflow:hidden;border-radius:16px;border:4px solid rgba(255,255,255,.18);box-shadow:0 18px 42px rgba(0,0,0,.35);background:#4d7b47}
.map-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;user-select:none;pointer-events:none}
.path-line{position:absolute;height:4px;background:rgba(255,236,92,.45);transform-origin:left center;border-radius:999px;z-index:7;pointer-events:none;display:none}
.path-dot{position:absolute;width:7px;height:7px;margin-left:-3.5px;margin-top:-3.5px;border-radius:50%;background:rgba(255,236,92,.95);box-shadow:0 0 0 3px rgba(0,0,0,.23);z-index:8;pointer-events:none;display:none}
.map-wrap.debug .path-dot,.map-wrap.debug .path-line{display:block}
.agent{position:absolute;width:40px;height:40px;transform:translate(-50%,-90%);z-index:30;pointer-events:none;filter:drop-shadow(0 3px 2px rgba(0,0,0,.35))}
.name{position:absolute;left:50%;top:-11px;transform:translateX(-50%);white-space:nowrap;background:rgba(0,0,0,.72);color:#fff;border:1px solid rgba(255,255,255,.42);border-radius:999px;padding:1px 6px;font-size:10px;font-weight:900;z-index:3}
.sprite{position:absolute;left:0;top:0;width:40px;height:40px;background-repeat:no-repeat;background-size:120px 160px;image-rendering:pixelated}
.shadow{position:absolute;left:50%;bottom:2px;width:18px;height:5px;transform:translateX(-50%);border-radius:50%;background:rgba(0,0,0,.22);z-index:-1}
.agent.state-walk .sprite{animation:walkBob .32s steps(2) infinite}
.agent.state-idle .sprite{animation:idleBreath 1.45s ease-in-out infinite}
.agent.state-talk .sprite{animation:talkNod .62s ease-in-out infinite}
.agent.state-work .sprite{animation:workPulse .5s ease-in-out infinite}
@keyframes walkBob{0%{transform:translateY(0)}50%{transform:translateY(-1px)}100%{transform:translateY(0)}}
@keyframes idleBreath{0%,100%{transform:translateY(0)}50%{transform:translateY(-0.6px)}}
@keyframes talkNod{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-1px) rotate(1deg)}}
@keyframes workPulse{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}
.state-badge{position:absolute;left:50%;top:35px;transform:translateX(-50%);background:rgba(255,255,255,.90);color:#1d2a1d;border:1px solid rgba(0,0,0,.25);border-radius:999px;padding:1px 5px;font-size:10px;font-weight:900;opacity:0;transition:opacity .2s;white-space:nowrap}
.agent.state-idle .state-badge,.agent.state-talk .state-badge,.agent.state-work .state-badge{opacity:1}
.bubble{position:absolute;transform:translate(-50%,-135%);background:#fff;color:#222;font-weight:800;padding:6px 10px;border-radius:9px;border:2px solid #353535;box-shadow:0 4px 0 rgba(0,0,0,.24);font-size:13px;opacity:0;transition:opacity .2s;z-index:70;max-width:240px;pointer-events:none;text-align:center}
.bubble.show{opacity:1}
.panel{background:#111811;border-left:1px solid rgba(255,255,255,.12);padding:18px;overflow:auto}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.controls.row1{grid-template-columns:1fr}
button{width:100%;padding:12px;border-radius:10px;border:0;font-weight:800;background:#7fd36b;cursor:pointer}
button.alt{background:#dce6d6;color:#111}
button.ghost{background:#394739;color:#fff}
.stat{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px}
.card strong{display:block;font-size:12px;color:#aee9a2;margin-bottom:4px}
.card span{font-size:20px;font-weight:900}
.log{height:270px;overflow:auto;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px;font-size:13px;line-height:1.55}
.log p{margin:0 0 8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08)}
.agent-list{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.mini{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:7px;font-size:12px}
.mini b{color:#aee9a2}
.sub,.legend{color:#c7d6c7;font-size:12px;line-height:1.6}
.loc-marker{position:absolute;transform:translate(-50%,-50%);background:rgba(40,90,200,.88);color:#fff;font-size:11px;font-weight:800;padding:2px 6px;border-radius:6px;border:1px solid rgba(255,255,255,.85);z-index:9;display:none;pointer-events:none;white-space:nowrap}
.map-wrap.debug .loc-marker{display:block}
.mini .now{color:#9fdf9f;font-weight:700}
.anchor-box{position:absolute;border:2px dashed rgba(120,200,255,.85);background:rgba(120,200,255,.10);transform:translate(-50%,-50%);z-index:20;pointer-events:none;border-radius:6px}
.anchor-box.sel{border-color:#ffe45c;background:rgba(255,228,92,.20);z-index:22}
.anchor-box .alabel{position:absolute;left:50%;top:-15px;transform:translateX(-50%);font-size:10px;font-weight:800;background:rgba(0,0,0,.72);padding:1px 5px;border-radius:6px;white-space:nowrap;color:#fff}
.anchor-dot{position:absolute;width:8px;height:8px;background:#ff5c5c;border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%);z-index:23;pointer-events:none}
.anchor-dot.sel{background:#ffe45c}
.map-wrap.editing{cursor:crosshair}
#editPanel .etgt{cursor:pointer}
#editPanel .etsel{outline:2px solid #ffe45c;background:rgba(255,228,92,.12)}
#jsonOut{width:100%;height:120px;background:rgba(0,0,0,.4);color:#cfe;border:1px solid rgba(255,255,255,.15);border-radius:8px;font-size:11px;font-family:monospace;margin-top:8px;padding:6px}
#editPanel label{display:block;font-size:12px;margin:6px 0;color:#c7d6c7}
#editPanel input[type=range]{width:100%}
.meet-bubble{position:absolute;transform:translate(-50%,-100%);background:#fff;color:#222;border:2px solid #353535;border-radius:10px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;z-index:80;box-shadow:0 4px 0 rgba(0,0,0,.24);opacity:0;pointer-events:none;max-width:230px;text-align:center;transition:opacity .15s}
.meet-bubble.show{opacity:1;pointer-events:auto}
.meet-bubble .mb-hint{font-size:10px;color:#2f6fd0;margin-top:3px;font-weight:900}
#dialogOverlay{position:fixed;left:0;right:0;bottom:0;z-index:200;display:none;padding:16px;background:linear-gradient(transparent,rgba(0,0,0,.5) 35%)}
.dlg-box{max-width:720px;margin:0 auto;background:#fff;color:#1d2a1d;border:3px solid #353535;border-radius:14px;padding:14px 16px;box-shadow:0 8px 0 rgba(0,0,0,.3)}
.dlg-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.dlg-portrait{width:46px;height:46px;border-radius:10px;border:2px solid #353535;background-repeat:no-repeat;background-size:138px 184px;background-position:0 0;image-rendering:pixelated;flex:none}
.dlg-who{font-weight:900;font-size:15px}
.dlg-meta{font-size:12px;color:#5a6b5a;margin-left:auto}
.dlg-text{font-size:15px;line-height:1.6;min-height:46px;font-weight:600}
.dlg-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.dlg-prog{font-size:12px;color:#5a6b5a}
.dlg-next{width:auto;padding:8px 20px;border-radius:9px;border:0;background:#7fd36b;font-weight:900;cursor:pointer}
.talk-log .titem{cursor:pointer}
.talk-log .titem:hover{background:rgba(255,255,255,.16)}
h1,h3{margin:0 0 10px}
@media (max-width:1100px){.app{grid-template-columns:1fr}.panel{border-left:0;border-top:1px solid rgba(255,255,255,.12)}.map-area{height:68vh}}
</style>
</head>
<body>
<div class="app">
  <main class="map-area">
    <div class="map-wrap" id="mapWrap">
      <img class="map-bg" src="assets/map.png" alt="정책 마을 지도">
      <div class="bubble" id="bubble"></div>
      <div class="meet-bubble" id="meetBubble"></div>
    </div>
  </main>
  <aside class="panel">
    <h1>생활 시뮬레이션 v14</h1>
    <div class="controls row1"><button id="startBtn">시작</button></div>
    <div class="controls"><button class="alt" id="pauseBtn">일시정지</button><button class="ghost" id="debugBtn">좌표/장소 보기</button></div>
    <div class="controls"><button class="alt" id="resetBtn">08:00 리셋</button><button class="ghost" id="speedBtn">속도 4×</button></div>
    <div class="controls row1"><button class="ghost" id="editBtn">✏️ 좌표 편집</button></div>
    <div class="stat">
      <div class="card"><strong>상태</strong><span id="stateText">대기</span></div>
      <div class="card"><strong>시간</strong><span id="timeText">09:00</span></div>
      <div class="card"><strong>이동 거리</strong><span id="distText">0</span></div>
      <div class="card"><strong>대화 수</strong><span id="talkText">0</span></div>
      <div class="card"><strong>업무/활동</strong><span id="workText">0</span></div>
      <div class="card"><strong>경로 그룹</strong><span>31</span></div>
    </div>
    <h3>에이전트</h3><div class="agent-list" id="agentList"></div>
    <h3>대화 기록</h3><div class="talk-log agent-list" id="talkLog"></div>
    <h3>로그</h3><div class="log" id="log"></div>
    <div class="legend">
      행 기준:<br>
      1행 = 아래(정면)<br>
      2행 = 오른쪽<br>
      3행 = 왼쪽<br>
      4행 = 위(뒷모습)
    </div>
    <div id="editPanel" style="display:none">
      <h3>좌표 편집</h3>
      <div class="sub">대상을 고르고 지도를 클릭해 위치를 찍어. 흩어짐은 슬라이더로 조절. 자동 저장됨(새로고침해도 유지).</div>
      <div id="editList" class="agent-list"></div>
      <div id="editControls" style="display:none">
        <div style="font-size:12px;margin:6px 0">선택: <b id="editSel">-</b></div>
        <label>흩어짐 가로 <input type="range" id="spreadW" min="0" max="180" step="2"></label>
        <label>흩어짐 세로 <input type="range" id="spreadH" min="0" max="140" step="2"></label>
      </div>
      <div class="controls"><button class="alt" id="copyBtn">📋 JSON 복사</button><button class="ghost" id="dlBtn">💾 다운로드</button></div>
      <div class="controls row1"><button class="ghost" id="resetAnchorsBtn">좌표 기본값으로 초기화</button></div>
      <textarea id="jsonOut" readonly></textarea>
    </div>
  </aside>
</div>
<div id="dialogOverlay">
  <div class="dlg-box">
    <div class="dlg-head">
      <div class="dlg-portrait" id="dlgPortrait"></div>
      <div class="dlg-who" id="dlgWho">-</div>
      <div class="dlg-meta" id="dlgMeta"></div>
    </div>
    <div class="dlg-text" id="dlgText"></div>
    <div class="dlg-foot"><span class="dlg-prog" id="dlgProg"></span><button class="dlg-next" id="dlgNext">다음 ▶</button></div>
  </div>
</div>

function shortestPath(fromKey,toKey){
  const start=repOf(fromKey),goal=repOf(toKey);
  const sp=nodePos(fromKey),gp=nodePos(toKey); // 실제 출발/진입 노드 좌표(대표노드 repPos 대신 끝점 보정용)
  if(start===goal)return (fromKey===toKey)?[gp]:[sp,gp];
  const prev=new Map();const q=[start];prev.set(start,null);let found=false;
  while(q.length){
    const cur=q.shift();
    if(cur===goal){found=true;break;}
    const nb=G_adj.get(cur);if(!nb)continue;
    for(const x of nb)if(!prev.has(x)){prev.set(x,cur);q.push(x);}
  }
  if(!found)return [sp,gp];
  const path=[];let c=goal;while(c!==null){path.push(repPos(c));c=prev.get(c);}path.reverse();
  // 양 끝점을 병합 대표노드가 아니라 실제 노드 좌표로 보정 -> 건물 진입 직선의 역주행 제거
  if(path.length){path[0]=sp;path[path.length-1]=gp;}
  return path;
}
// ===================== 경로 추종 (왕복 제거, 도착하면 행동) =====================
function makeLineInfoFromPoints(pts){
  if(pts.length<2)pts=[pts[0]||{x:0,y:0},pts[0]||{x:0,y:0}];
  const cum=[0];
  for(let i=1;i<pts.length;i++)cum[i]=cum[i-1]+Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
  return {pts,cum,total:cum[cum.length-1]||1};
}
function setRoute(agent,waypoints){
  agent.routeInfo=makeLineInfoFromPoints(waypoints);
  agent.s=0;agent.routing=true;
  setState(agent,'walk',9999);
}
function followRoute(agent,dt){
  if(!agent.routeInfo){agent.routing=false;return;}
  const before=pointAt(agent.routeInfo,agent.s);
  agent.s+=agent.speed*dt*speedMul;
  const arrived=agent.s>=agent.routeInfo.total;
  if(arrived)agent.s=agent.routeInfo.total;
  const pos=pointAt(agent.routeInfo,agent.s);
  setAgentPosition(agent,pos.x,pos.y);
  const dx=pos.x-before.x,dy=pos.y-before.y,moved=Math.hypot(dx,dy);
  if(moved>0.01){
    agent.frameDistance+=moved;
    if(agent.frameDistance>=10){agent.frame=(agent.frame+1)%4;agent.frameDistance=0;}
    setFrame(agent,directionFor(dx,dy,agent.lastDir),agent.frame);
  }
  totalDist+=moved;
  if(arrived){agent.routing=false;arriveAtLocation(agent);}
}
// ===================== 스케줄 실행(시간 -> 장소 -> 행동) =====================
const WORKISH=['cafe','community_center','welfare_center','school','town_hall','daycare','garden','policy_center'];
function activeBlock(agent,cm){
  const sch=agent.schedule||[];if(!sch.length)return null;
  const md=((cm%1440)+1440)%1440;
  for(const b of sch){const s=parseHM(b.start_time),e=parseHM(b.end_time);if(md>=s&&md<e)return b;}
  return sch[sch.length-1]; // 00:00~08:00 등 빈 구간은 마지막 블록(보통 집)
}
function arriveAtLocation(agent){
  const b=agent.curBlock;if(!b)return;
  agent.currentLocKey=b.location_key;
  const loc=LOC_BY_KEY[b.location_key];
  const st=WORKISH.includes(b.location_key)?'work':'idle';
  const label=b.action.length>10?b.action.slice(0,10)+'…':b.action;
  setState(agent,st,9999,label);
  sayAt(agent.x,agent.y-18,b.action);
  log(`📍 <b>${esc(agent.name)}</b> · ${esc(loc?loc.label:b.location_key)} 도착 — ${esc(b.action)}`);
}
function updateAgent(agent,dt){
  const b=activeBlock(agent,clockMin);
  if(b && b!==agent.curBlock){
    agent.curBlock=b;
    if(b.location_key!==agent.currentLocKey){
      // 새 일정 장소로 이동: 도로로 입구까지 간 뒤, 마지막에 건물 안 도착점(anchor)으로 직선 진입
      const fromKey=nearestNode(agent.x,agent.y);
      const toLoc=LOC_BY_KEY[b.location_key];
      const wp=shortestPath(fromKey,entryNodeFor(agent,b.location_key));
      const dest=arrivalPosFor(b.location_key,agent.id,agent.idx);
      if(dest)wp.push({x:dest.x,y:dest.y}); // 입구 도로노드 -> 건물 안 도착점(흩어짐 슬롯 포함)
      setRoute(agent,wp);
      agent.targetLocKey=b.location_key;
      workCount++;workText.textContent=workCount;
      log(`🚶 <b>${esc(agent.name)}</b> · ${fmtClock(clockMin)} ${esc(toLoc?toLoc.label:b.location_key)}(으)로 이동`);
    }else{
      arriveAtLocation(agent); // 같은 장소, 행동만 갱신
    }
  }
  if(agent.state==='talk'){
    agent.stateUntil-=dt;
    if(agent.stateUntil<=0&&agent.curBlock)arriveAtLocation(agent);
    return;
  }
  if(agent.routing){followRoute(agent,dt);return;}
  // 도착해 머무는 중: 행동 애니메이션 유지
  if(agent.state==='work'){const f=Math.floor(performance.now()/240)%2;setFrame(agent,agent.lastDir||'down',f);}
  else setFrame(agent,agent.lastDir||'down',0);
}
function scheduledLoc(a){const b=activeBlock(a,clockMin);return b?b.location_key:null;}
function checkMeetings(){ // 예정된 만남: 두 캐릭터가 그 장소에 함께 도달하면 발화(시각이 좀 늦어도 도착을 기다림)
  if(meeting)return;
  for(const mt of MEET){
    if(mt._fired)continue;
    if(clockMin<mt.start)continue;                 // 만남 예정 시각 전엔 대기
    const a=agentById[mt.a],b=agentById[mt.b];
    if(!a||!b||!mt.turns||!mt.turns.length){mt._fired=true;continue;}
    if(!a.routing&&!b.routing&&a.currentLocKey===mt.place&&b.currentLocKey===mt.place){
      mt._fired=true;startMeeting(a,b,mt.turns);return; // 둘 다 도착해 함께 있음 -> 발화
    }
    // end 가 지났는데 둘 다 더는 그 장소에 머물 예정도 아니면(이동 지연으로 못 만남) 진짜 놓침 -> 로그로 가시화
    if(clockMin>mt.end&&scheduledLoc(a)!==mt.place&&scheduledLoc(b)!==mt.place){
      mt._fired=true;
      log(`⏭️ <b>${esc(nameOf(mt.a))}</b>·<b>${esc(nameOf(mt.b))}</b> · ${esc((LOC_BY_KEY[mt.place]||{}).label||mt.place)} 만남 놓침(이동 지연)`);
    }
  }
}
function updateClock(dt){
  clockMin+=dt*3.2*speedMul;
  if(clockMin>=1440){clockMin=480;MEET.forEach(m=>{m._fired=false;});} // 24:00 -> 08:00 반복, 만남도 리셋
  timeText.textContent=fmtClock(clockMin);
}
function loop(now){
  if(!running)return;
  if(lastTime===null)lastTime=now;
  const dt=Math.min(0.05,(now-lastTime)/1000);lastTime=now;
  agents.forEach(a=>updateAgent(a,dt));
  if(talkEnabled)checkMeetings();
  updateClock(dt);
  if(now-lastPanel>400){renderAgentList();lastPanel=now;}
  distText.textContent=Math.floor(totalDist);
  animationId=requestAnimationFrame(loop);
}
function start(){
  if(editing)return; // 편집 모드 중엔 시작 차단(정지 미리보기 유지)
  if(meeting)return; // 대화/만남 중엔 시작 차단(대화 흐름 보호)
  if(running)return;
  running=true;lastTime=null;stateText.textContent='생활중';
  log('▶ 하루 시작 — 각자 일정대로 생활합니다.');
  animationId=requestAnimationFrame(loop);
}
function pause(){
  if(editing)return; // 편집 모드 중엔 재생/정지 토글 차단
  if(meeting)return; // 대화/만남 중엔 토글 차단
  running=!running;
  if(running){lastTime=null;stateText.textContent='생활중';animationId=requestAnimationFrame(loop)}
  else{stateText.textContent='일시정지';cancelAnimationFrame(animationId)}
}
function resetDay(){
  clearMeeting(); // 만남/대화 중이었으면 정리
  running=false;cancelAnimationFrame(animationId); // 리셋 = 08:00 으로 되돌리고 정지(running/표시 일관)
  MEET.forEach(m=>{m._fired=false;}); // 만남 재생 기록 초기화
  clockMin=480;
  agents.forEach(a=>{
    const p=homePosFor(a.id,a.idx);
    a.curBlock=null;a.currentLocKey=a.home;a.targetLocKey=null;a.routing=false;a.routeInfo=null;a.s=0;
    setAgentPosition(a,p.x,p.y);setState(a,'idle',9999);setFrame(a,'down',0);
  });
  timeText.textContent='08:00';if(!editing)stateText.textContent='대기';renderAgentList();log('⟲ 08:00 로 리셋');
}

  if(!meeting)return;
  const m=meeting, replay=m.replay;
  if(!replay)logTalk(m); // 기록은 정리 전에(m 참조 유효할 때)
  clearMeeting();
  if(replay){if(wasRunningBeforeView)resumeSim();else stateText.textContent='일시정지';}
  else resumeSim();
}
function logTalk(m){
  const loc=LOC_BY_KEY[m.agentA?m.agentA.currentLocKey:null];
  talkHistory.unshift({aId:m.aId,bId:m.bId,aName:m.aName,bName:m.bName,turns:m.turns,time:fmtClock(clockMin),place:loc?loc.label:''});
  if(talkHistory.length>40)talkHistory.pop();
  renderTalkLog();
}
function renderTalkLog(){
  if(!talkHistory.length){talkLog.innerHTML='<div class="sub" style="grid-column:1/3">아직 대화 기록이 없어요.</div>';return;}
  talkLog.innerHTML=talkHistory.map((h,i)=>`<div class="mini titem" data-i="${i}"><b>💬 ${esc(h.aName)}↔${esc(h.bName)}</b> <span class="now">${esc(h.time)}</span><br>${esc(h.place)}</div>`).join('');
  talkLog.querySelectorAll('.titem').forEach(el=>el.addEventListener('click',()=>replayTalk(+el.dataset.i)));
}
function replayTalk(i){ // 기록 클릭 -> 그 대화 다시 펼쳐보기
  const h=talkHistory[i];if(!h||meeting)return;
  wasRunningBeforeView=running;running=false;cancelAnimationFrame(animationId);
  meeting={aId:h.aId,bId:h.bId,aName:h.aName,bName:h.bName,turns:h.turns,idx:0,opened:true,replay:true};
  dialogOverlay.style.display='block';renderDialog();
}
meetBubble.addEventListener('click',e=>{e.stopPropagation();if(meeting&&!meeting.opened)openDialog();});
map.addEventListener('click',()=>{if(meeting&&!meeting.opened)dismissMeeting();});
dlgNext.addEventListener('click',advanceDialog);
renderTalkLog();
init();
</script>
</body>
</html>
